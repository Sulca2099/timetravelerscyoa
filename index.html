<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Choose your own adventure Time Choice</title>
    <link rel="stylesheet" href="./assets/main.css">
  </head>
  <body>
    <script type="module" src="./assets/engine_inter.js"></script>
    <script src="./assets/gameengine.js"></script>
    <div id="topleftbuttons" class="organizedside"><!--this is the top bar for the main descriptions of the players stats, the buttons will disapear when their is none of that, loiie when you haven't drank the potion the magic will be gone-->
      <button id="health" onclick="Health.showAdvanced()"><img src="./assets/icons/health.png" alt="health"></button>
      <button id="power" onclick="Power.showAdvanced()"><img src="./assets/icons/strength.png" alt="power"></button>
      <button id="magic" onclick="Magic.showAdvanced()"><img src="./assets/icons/magic.png" alt="magic"></button>
    </div>
    <div id="toprightbuttons" class="organizedside"><!--this is the top bar for the right for more informations and congfigurations to the game-->
      <button id="settings" onclick="Settings.showAdvanced()"><img src="./assets/icons/settings.png" alt="settings"></button>
      <button id="inventory" onclick="inventory.showAdvanced()"><img src="./assets/icons/inventory.png" alt="inventory"></button>
      <button id="map" onclick="Map.showAdvanced()"><img src="./assets/icons/map.png" alt="map"></button>
    </div>
    <div id="maintext">
      <!--this is forthe large center scroolable text that can is interactive and explains the story-->
      <p id="dynamictext">Welcome to Time Choice</p>
    </div>
    <div id="bottombuttons" class="organizedside">
      <div id="compass"><!--a compass image with theses directions on, they will be higligyted in blue when the direction is legal-->
        <img src="./assets/icons/compass.png" alt="compass_img" width="10%" height="10%">
        <button id="north" onclick="letsdo('goto north');"></button>
        <button id="east" onclick="letsdo('goto east');"></button>
        <button id="south" onclick="letsdo('goto south');"></button>
        <button id="west" onclick="letsdo('goto west');"></button>
      </div>
      <div id="actions">
        <img src="./assets/icons/action.png" alt="action">
        <!--use javascript to append the actions-->
      </div>
      <div id="task">
        <img src="./assets/icons/tasks.png" alt="tasks">
        <!--use javascript tochange the text of the main task-->
        <p>No new tasks!</p>
      </div>
    </div>
    <!--Classes in the html
    Power,Magic,Health are under the simple button class
    Map, settings, Inventory is under the instance iframe class (iframe popup of the map webpage html)
    world is under the game world class
    Ideas for game engine
    each location has two (or more based of the change) states and dependencies, 
    the regular state (nothing importnt changed) the buildings/items+people are still their
    and the changed state, which is like thr regular state, but hold the information
    for the locationafter the depedencies changed
    -->
  </body>
</html>
